<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surface Cleaning</title>
  <style>
    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
      background:#040402;
      color:#ffffff;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      text-align:center;
    }

    .hero{
      width:100%;
      background:#040402;
    }

    .hero picture{
      display:block;
      width:100%;
    }

    .hero img{
      display:block;
      width:100%;
      height:auto;
    }

    .content{
      max-width:760px;
      margin:0 auto;
      padding:56px 24px 72px;
      position:relative;
      z-index:2;
      background:#040402;
    }

    h1{
      margin:0 0 22px;
      font-size:42px;
      line-height:1.15;
      color:#ffffff;
    }

    p{
      margin:0 0 18px;
      font-size:20px;
      line-height:1.75;
      color:#d2d2d2;
    }

    .small{
      margin-top:28px;
      font-size:14px;
      color:#8f8f8f;
      letter-spacing:1px;
      text-transform:uppercase;
    }

    @media (max-width:700px){
      .content{
        padding:40px 20px 56px;
      }

      h1{
        font-size:30px;
      }

      p{
        font-size:18px;
      }

      .small{
        font-size:12px;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <picture>
      <source media="(max-width:700px)" srcset="hero-mobile.jpg">
      <img src="hero-desktop.jpg" alt="Surface Cleaning">
    </picture>
  </section>

  <section class="content">
    <h1>Kiitos yhteistyöstä</h1>

    <p>
      Surface Cleaning -toiminta on päättynyt yrittäjän siirtyessä
      armeijapalveluksen jälkeen muihin tehtäviin.
    </p>

    <p>
      Lämmin kiitos kaikille asiakkaille ja yhteistyökumppaneille
      kuluneista vuosista.
    </p>

    <div class="small">Surface Cleaning</div>
  </section>

</body>
</html>
