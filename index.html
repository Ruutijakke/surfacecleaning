<!DOCTYPE html>
<html lang="fi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surface Cleaning</title>

<style>

*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
background:#040402;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

/* HERO */

.hero{
position:relative;
width:100%;
}

.hero img{
width:100%;
display:block;
}

/* TEKSTI KUVAN PÄÄLLÄ */

.overlay{
position:absolute;
bottom:18%;
left:50%;
transform:translateX(-50%);
text-align:center;
max-width:700px;
padding:30px 20px;
}

/* TEKSTIT */

h1{
font-size:42px;
margin-bottom:20px;
}

p{
font-size:20px;
line-height:1.7;
color:#e0e0e0;
margin-bottom:12px;
}

.small{
margin-top:25px;
font-size:14px;
letter-spacing:1px;
color:#bbb;
}

/* MOBILE */

@media (max-width:700px){

.overlay{
bottom:6%;
padding:20px;
}

h1{
font-size:30px;
}

p{
font-size:18px;
}

}

</style>

</head>

<body>

<div class="hero">

<picture>

<source media="(max-width:700px)" srcset="hero-mobile.jpg">

<img src="hero-desktop.jpg" alt="Surface Cleaning">

</picture>

<div class="overlay">

<h1>Kiitos yhteistyöstä</h1>

<p>
Surface Cleaning -toiminta on päättynyt yrittäjän siirtyessä
armeijapalveluksen jälkeen uusiin tehtäviin.
</p>

<p>
Lämmin kiitos kaikille asiakkaille ja yhteistyökumppaneille
kuluneista vuosista.
</p>

<div class="small">
Surface Cleaning
</div>

</div>

</div>

</body>
</html>
