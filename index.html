<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surface Cleaning</title>

<style>

*{
box-sizing:border-box;
}

html, body{
margin:0;
padding:0;
height:100%;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

/* TAUSTA */

body{
background:
linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
url("SurfaceCleaning_seo.jpg") center center / cover no-repeat;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* SISÄLTÖ */

.container{
text-align:center;
padding:40px;
max-width:700px;
}

/* LOGO */

.logo{
width:420px;
max-width:80%;
margin-bottom:40px;
}

/* TEKSTI */

h1{
font-size:46px;
margin-bottom:25px;
}

p{
font-size:20px;
line-height:1.7;
color:#ddd;
margin-bottom:15px;
}

.small{
margin-top:25px;
font-size:14px;
letter-spacing:1px;
color:#aaa;
}

/* MOBILE */

@media (max-width:700px){

}

p{

}

.logo{

</style>
</head>

<body>

<div class="container">

<img class="logo" src="SurfaceCleaning_logo_02.png">

<h1>Kiitos yhteistyöstä</h1>

<p>
Surface Cleaning -toiminta on päättynyt yrittäjän siirtyessä
armeijapalveluksen jälkeen uusiin tehtäviin.
</p>

<p>
Lämmin kiitos kaikille asiakkaille ja yhteistyökumppaneille
kuluneista vuosista.
</p>

<div class="small">
Surface Cleaning
</div>

</div>
