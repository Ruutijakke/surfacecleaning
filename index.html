<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surface Cleaning</title>

<style>

*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
height:100%;
background:#000;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

/* KOKO SIVU */

.page{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:40px 20px;
}

/* TAUSTAKUVA (EI SKAALAUDU) */

.hero{
position:relative;
width:1200px;
height:675px;
max-width:100%;
background:url("SurfaceCleaning_seo.jpg") center no-repeat;
background-size:contain;
display:flex;
align-items:center;
justify-content:center;
}

/* TUMMA OVERLAY */

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

/* SISÄLTÖ */

.content{
position:relative;
text-align:center;
max-width:700px;
padding:30px;
}

/* LOGO */

.logo{
width:380px;
max-width:80%;
margin-bottom:40px;
}

/* TEKSTIT */

h1{
font-size:44px;
margin-bottom:20px;
}

p{
font-size:20px;
line-height:1.7;
color:#ddd;
margin-bottom:12px;
}

.small{
margin-top:25px;
font-size:14px;
letter-spacing:1px;
color:#aaa;
}

/* MOBILE */

@media (max-width:700px){

.hero{
height:auto;
aspect-ratio:16/9;
}

.logo{
width:240px;
}

h1{
font-size:30px;
}

p{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="page">

<div class="hero">

<div class="content">

<img class="logo" src="SurfaceCleaning_logo_02.png">

<h1>Kiitos yhteistyöstä</h1>

<p>
Surface Cleaning -toiminta on päättynyt yrittäjän siirtyessä
armeijapalveluksen jälkeen uusiin tehtäviin.
</p>

<p>
Lämmin kiitos kaikille asiakkaille ja yhteistyökumppaneille
kuluneista vuosista.
</p>

<div class="small">
Surface Cleaning
</div>

</div>

</div>

</div>

</body>
</html>
